<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Landing Page</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    line-height:1.6;
}

nav{
    position:fixed;
    top:0;
    width:100%;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:transparent;
    transition:0.3s;
}

nav.scrolled{
    background:black;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    padding:8px 12px;
    transition:0.3s;
}

nav ul li a:hover{
    background:white;
    color:black;
    border-radius:5px;
}

.hero{
    height:100vh;
    background:linear-gradient(to right,#4a00e0,#8e2de2);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin-top:10px;
    font-size:20px;
}

section{
    padding:80px 20px;
    text-align:center;
}

section h2{
    margin-bottom:10px;
}
</style>

</head>
<body>

<nav id="navbar">
    <div class="logo">My Website</div>

    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="hero">
    <h1>Responsive Landing Page</h1>
    <p>Task-01 Internship Project</p>
</div>

<section>
    <h2>About Us</h2>
    <p>Welcome to our responsive landing page website.</p>
</section>

<section>
    <h2>Services</h2>
    <p>Web Development, UI Design and Responsive Websites.</p>
</section>

<section>
    <h2>Contact</h2>
    <p>Email: contact@example.com</p>
</section>

<script>
window.addEventListener("scroll", function() {

    let navbar = document.getElementById("navbar");

    if(window.scrollY > 50){
        navbar.classList.add("scrolled");
    }
    else{
        navbar.classList.remove("scrolled");
    }

});
</script>

</body>
</html>
